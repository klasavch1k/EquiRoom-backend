<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя - Коллекция статуэток лошадей</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="header">
    <div class="profile-pic"></div>
    <div class="profile-name">Loading...</div>
    <button class="logout-button" onclick="logout()" style="display: none;">Выйти</button>
</div>

<div class="stats">
    <div class="stat stat-figurines">
        <div class="stat-value">0</div>
        <div class="stat-label">Фигурки</div>
    </div>
    <div class="stat stat-collecting">
        <div class="stat-value">0</div>
        <div class="stat-label">Коллекционирую</div>
    </div>
    <div class="stat stat-members">
        <div class="stat-value">0</div>
        <div class="stat-label">Члены</div>
    </div>
</div>

<div class="buttons">
    <button class="button add-button" onclick="addFigurine()">+ Добавить фигурку</button>
    <button class="button edit-button" onclick="editDetails()">Редактировать детали</button>
</div>

<div class="section">
    <div class="section-title">Лошади</div>
    <div class="grid">
        <!-- Карточки загружаются динамически -->
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-icon home-icon" onclick="navigate('home')">🏠</div>
    <div class="nav-icon search-icon" onclick="navigate('search')">🔍</div>
    <div class="nav-plus" onclick="navigate('add')">+</div>
    <div class="nav-icon chat-icon" onclick="navigate('chat')">💬</div>
    <div class="nav-icon profile-icon" onclick="navigate('profile')">👤</div>
</div>

<script src="/script.js"></script>
<script src="/nav.js"></script>
</body>
</html>
