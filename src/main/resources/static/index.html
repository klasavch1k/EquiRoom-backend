<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя - Коллекция статуэток лошадей</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="header">
    <div class="profile-pic"></div>
    <div class="profile-name">Loading...</div>
</div>

<div class="stats">
    <div class="stat stat-figurines">
        <div class="stat-value">0</div>
        <div class="stat-label">Фигурки</div>
    </div>
    <div class="stat stat-collecting">
        <div class="stat-value">0</div>
        <div class="stat-label">Коллекционирую</div>
    </div>
    <div class="stat stat-members">
        <div class="stat-value">0</div>
        <div class="stat-label">Члены</div>
    </div>
</div>

<div class="buttons">
    <button class="button add-button" onclick="addFigurine()">+ Добавить фигурку</button>
    <button class="button edit-button" onclick="editDetails()">Редактировать детали</button>
</div>

<div class="section">
    <div class="section-title">Лошади</div>
    <div class="grid">
        <!-- Карточки загружаются динамически -->
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-icon">🏠</div>
    <div class="nav-icon">🔍</div>
    <div class="nav-plus">+</div>
    <div class="nav-icon">💬</div>
    <div class="nav-icon">👤</div>
</div>

<script src="/script.js"></script>
</body>
</html>
