<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить статуэтку лошади</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <h2>Добавить новую статуэтку</h2>
    <form id="add-model-form" class="add-model-form">
        <div class="form-group">
            <label for="name">Имя лошади</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="breed">Порода</label>
            <input type="text" id="breed" name="breed" required>
        </div>
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="masterName">Имя мастера</label>
            <input type="text" id="masterName" name="masterName">
        </div>
        <div class="form-group">
            <label for="mediaLink">Ссылка на аватар</label>
            <input type="url" id="mediaLink" name="mediaLink" required>
        </div>
        <button type="submit" class="add-model-button">Добавить</button>
    </form>
    <div id="message" class="message"></div>
</div>

<div class="bottom-nav">
    <div class="nav-icon home-icon" onclick="navigate('home')">🏠</div>
    <div class="nav-icon search-icon" onclick="navigate('search')">🔍</div>
    <div class="nav-plus" onclick="navigate('add')">+</div>
    <div class="nav-icon chat-icon" onclick="navigate('chat')">💬</div>
    <div class="nav-icon profile-icon" onclick="navigate('profile')">👤</div>
</div>

<script src="/script/add-model.js"></script>
<script src="/script/nav.js"></script>
</body>
</html>
