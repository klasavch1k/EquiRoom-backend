<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Коллекция статуэток лошадей</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="header">
    <div class="profile-name">Регистрация</div>
</div>

<div class="section register-form">
    <form id="register-form">
        <div class="form-group">
            <label for="firstName">Имя:</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
            <label for="lastName">Фамилия:</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="button register-button">Зарегистрироваться</button>
        <div id="message" class="message"></div>
    </form>
</div>

<div class="bottom-nav">
    <div class="nav-icon">🏠</div>
    <div class="nav-icon">🔍</div>
    <div class="nav-plus">+</div>
    <div class="nav-icon">💬</div>
    <div class="nav-icon">👤</div>
</div>

<script src="/script/register-script.js"></script>
</body>
</html>
