<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск пользователей - Коллекция статуэток лошадей</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="header">
    <div class="profile-name">Поиск пользователей</div>
</div>

<div class="search-section">
    <input type="text" id="search-input" placeholder="Введите имя или email для поиска..." class="search-input">
    <button onclick="searchUsers()" class="button search-button">Поиск</button>
</div>

<div class="section">
    <div class="section-title">Пользователи</div>
    <div class="user-grid">
        <!-- Карточки пользователей загружаются динамически -->
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-icon">🏠</div>
    <div class="nav-icon">🔍</div>
    <div class="nav-plus">+</div>
    <div class="nav-icon">💬</div>
    <div class="nav-icon">👤</div>
</div>

<script src="/search-script.js"></script>
</body>
</html>
