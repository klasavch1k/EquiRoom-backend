spring:
  application:
    name: modelHorseProject
  datasource:
    url: jdbc:postgresql://localhost:5432/modelhorse
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties.hibernate:
      show_sql: true
      format_sql: true
    open-in-view: false
jwt:
  secret: ${JWT_SECRET}
  validity: 18000